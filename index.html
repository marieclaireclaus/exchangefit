<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="ExchangeFit"/>
<title>ExchangeFit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
:root{
  --bg:#F2F2F7;--s1:#FFFFFF;--s2:#F2F2F7;--s3:#E5E5EA;
  --bd:#D1D1D6;--bdd:#E5E5EA;
  --teal:#0D9488;--teal-lt:#CCFBF1;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --violet:#7C3AED;--violet-lt:#EDE9FE;
  --red:#DC2626;--red-lt:#FEE2E2;
  --grn:#16A34A;--grn-lt:#DCFCE7;
  --blue:#2563EB;--blue-lt:#DBEAFE;
  --pink:#DB2777;--pink-lt:#FCE7F3;
  --txt:#1C1C1E;--sub:#6C6C70;--dim:#AEAEB2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);overscroll-behavior:none;font-family:'Inter',sans-serif;}
::-webkit-scrollbar{display:none;}
button,input,select,textarea{font-family:'Inter',sans-serif;cursor:pointer;}
#root{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));}

/* ── Nav ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);z-index:90;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);}
.nb{flex:1;border:none;background:none;padding:10px 4px 13px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ni{font-size:20px;line-height:1.1;}
.nl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--bdd);border-radius:16px;padding:16px;margin-bottom:10px;}
.card2{background:var(--s1);border:1px solid var(--bdd);border-radius:12px;padding:11px 13px;margin-bottom:7px;}
.card-teal{background:var(--teal-lt);border:1px solid rgba(13,148,136,.2);}
.card-amber{background:var(--amber-lt);border:1px solid rgba(217,119,6,.2);}

/* ── Inputs ── */
.lbl{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--bd);color:var(--txt);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--teal);}
.fg{margin-bottom:13px;}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;text-align:center;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:var(--s2);color:var(--sub);border:1.5px solid var(--bd);}
.btn-sm{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;}

/* ── Sheet / Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(6px);}
.sheet{background:var(--s1);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;
  border-top:1px solid var(--bd);padding:0 18px calc(28px + env(safe-area-inset-bottom,0px));max-height:93vh;overflow-y:auto;}
.hdl{width:38px;height:4px;background:var(--bd);border-radius:2px;margin:13px auto 15px;}

/* ── Pills ── */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;}

/* ── Progress ring card ── */
.ex-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.ex-grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ex-card{background:var(--s1);border:1px solid var(--bdd);border-radius:14px;padding:12px 10px;position:relative;}

/* ── Category tabs ── */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.cat-tab{white-space:nowrap;padding:7px 13px;border-radius:20px;border:1.5px solid var(--bd);
  background:var(--s1);color:var(--sub);font-size:12px;font-weight:600;flex-shrink:0;}
.cat-tab.on{border-color:var(--teal);background:var(--teal-lt);color:var(--teal);}

/* ── Food items ── */
.food-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px;border-radius:12px;background:var(--s1);border:1px solid var(--bdd);margin-bottom:7px;}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;gap:0;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;overflow:hidden;}
.step-btn{width:44px;height:44px;border:none;background:none;font-size:22px;font-weight:600;color:var(--teal);display:flex;align-items:center;justify-content:center;}
.step-val{flex:1;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;color:var(--txt);padding:0 8px;}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(4px);opacity:0;
  padding:9px 20px;border-radius:50px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;
  box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;white-space:nowrap;pointer-events:none;transition:opacity .2s,transform .2s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Date nav ── */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;background:var(--s1);border-bottom:1px solid var(--bdd);}
.date-arrow{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;}

/* ── Page header ── */
.ph{padding:calc(52px + env(safe-area-inset-top,0px)) 18px 14px;background:var(--s1);border-bottom:1px solid var(--bdd);}
.pt{font-size:22px;font-weight:800;letter-spacing:-.02em;}

/* ── Quagga scanner ── */
#qg-wrap{position:fixed;inset:0;background:#000;z-index:1000;max-width:430px;left:50%;transform:translateX(-50%);right:auto;width:100%;}
#qg-viewport{position:absolute;inset:0;overflow:hidden;}
#qg-viewport video,#qg-viewport canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;object-fit:cover!important;}
#qg-viewport canvas.drawingBuffer{display:none!important;}
.qg-head{position:absolute;top:0;left:0;right:0;z-index:20;padding:max(52px,env(safe-area-inset-top,52px)) 18px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);display:flex;justify-content:space-between;align-items:flex-start;}
.qg-foot{position:absolute;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;border-top:1px solid var(--bd);padding:20px 18px max(28px,env(safe-area-inset-bottom,28px));}
.qg-vf{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:78%;max-width:290px;height:110px;z-index:15;pointer-events:none;}
.qg-c{position:absolute;width:22px;height:22px;}
.qg-c.tl{top:0;left:0;border-top:3px solid #0D9488;border-left:3px solid #0D9488;border-radius:5px 0 0 0;}
.qg-c.tr{top:0;right:0;border-top:3px solid #0D9488;border-right:3px solid #0D9488;border-radius:0 5px 0 0;}
.qg-c.bl{bottom:0;left:0;border-bottom:3px solid #0D9488;border-left:3px solid #0D9488;border-radius:0 0 0 5px;}
.qg-c.br{bottom:0;right:0;border-bottom:3px solid #0D9488;border-right:3px solid #0D9488;border-radius:0 0 5px 0;}
@keyframes qbeam{0%{top:2px;opacity:1}100%{top:calc(100% - 4px);opacity:.25}}
.qg-beam{position:absolute;left:6px;right:6px;height:2px;background:linear-gradient(90deg,transparent,#0D9488,transparent);box-shadow:0 0 10px #0D9488;animation:qbeam 1.6s ease-in-out infinite alternate;}
.qg-sh{position:absolute;background:rgba(0,0,0,.55);z-index:14;}

@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.su{animation:slideUp .28s cubic-bezier(.34,1.4,.64,1);}
</style>
</head>

// ── Date helpers ──────────────────────────────────────────────────
function dateForOffset(offset){
  const d=new Date(); d.setDate(d.getDate()+offset); return d.toDateString();
}
function dateLabel(offset){
  if(offset===0) return 'Today';
  if(offset===-1) return 'Yesterday';
  const d=new Date(); d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function fmt(n){ if(!n&&n!==0) return 0; return n%1===0?n:+n.toFixed(2); }

// ── Totals for a given day offset ────────────────────────────────
function getTotals(offset=0){
  const key=dateForOffset(offset);
  const foods=S.entries.filter(e=>e.day===key);
  const wkts=S.workouts.filter(w=>w.day===key);
  const pts=foods.reduce((a,e)=>({
    P:a.P+(e.P||0),S:a.S+(e.S||0),F:a.F+(e.F||0),Fr:a.Fr+(e.Fr||0),M:a.M+(e.M||0)
  }),{P:0,S:0,F:0,Fr:0,M:0});
  const burned=wkts.reduce((s,w)=>s+w.burned,0);
  const kcal=pts.P*EX_KCAL.P+pts.S*EX_KCAL.S+pts.F*EX_KCAL.F+pts.Fr*EX_KCAL.Fr+pts.M*EX_KCAL.M;
  return {pts,burned,kcal,wkts,foods,key};
}

function calcBurn(actId,mins,intensity){
  const a=ACTS.find(x=>x.id===actId); if(!a) return 0;
  const m=intensity==='easy'?.75:intensity==='hard'?1.3:1.0;
  return Math.round(a.met*m*WT_KG*(mins/60));
}

// ── Calculate exchanges from grams ───────────────────────────────
function gramsToExchanges(food, grams){
  if(!food.gPer1 || !food.mainType) return null;
  const ratio = grams / food.gPer1;
  // Scale all exchange types proportionally
  const result = {};
  ['P','S','F','Fr','M'].forEach(t=>{ if(food[t]) result[t]=Math.round(food[t]*ratio*4)/4; });
  return result;
}

let toastTimer=null;
function toast(msg,bg='var(--teal)',color='#fff'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=bg; el.style.color=color;
  el.classList.add('show'); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── Exchange Arc Card ─────────────────────────────────────────────
function arcCard(type, consumed, target, small=false){
  const cfg=EX_CFG[type]; const col=EX_COL[type];
  const pct=Math.min(1,consumed/target);
  const over=consumed>target;
  const r=small?18:22; const circ=2*Math.PI*r; const dash=pct*circ;
  const displayCol=over?'var(--red)':col;
  const sz=small?44:52;
  return `
  <div class="ex-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:9px;font-weight:700;color:${col};letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px">${cfg.emoji} ${cfg.label}</div>
        <div style="font-size:${small?22:26}px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;color:${over?'var(--red)':col}">${fmt(consumed)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:1px">/ ${target} pts</div>
      </div>
      <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bdd)" stroke-width="3.5"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${displayCol}" stroke-width="3.5"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})"/>
        <text x="${sz/2}" y="${sz/2+4}" text-anchor="middle" fill="${displayCol}"
          font-size="${small?8:9}" font-weight="700" font-family="'JetBrains Mono',monospace">${Math.round(pct*100)}%</text>
      </svg>
    </div>
  </div>`;
}

// ── Exchange line for diary ────────────────────────────────────────
function exLine(entry){
  const parts=[];
  if(entry.P)  parts.push(`<span class="pill" style="background:var(--violet-lt);color:${EX_COL.P}">🥩 ${fmt(entry.P)}P</span>`);
  if(entry.S)  parts.push(`<span class="pill" style="background:var(--amber-lt);color:${EX_COL.S}">🍞 ${fmt(entry.S)}S</span>`);
  if(entry.F)  parts.push(`<span class="pill" style="background:var(--amber-lt);color:${EX_COL.F}">🥑 ${fmt(entry.F)}F</span>`);
  if(entry.Fr) parts.push(`<span class="pill" style="background:var(--grn-lt);color:${EX_COL.Fr}">🍎 ${fmt(entry.Fr)}Fr</span>`);
  if(entry.M)  parts.push(`<span class="pill" style="background:var(--blue-lt);color:${EX_COL.M}">🥛 ${fmt(entry.M)}M</span>`);
  if(entry.free) parts.push(`<span class="pill" style="background:var(--grn-lt);color:var(--grn)">✓ Free</span>`);
  return parts.join(' ');
}

    if(food.Fr) pts.push(`<span style="color:${EX_COL.Fr}">🍎${fmt(food.Fr)}Fr</span>`);

// ── Portion / Gram modal ──────────────────────────────────────────
function openPortion(food){
  S.selectedFood=food; S.portions=1; S.gramMode=!!food.gPer1; S.gramInput=food.gPer1||null;
  const ov=document.getElementById('fp-ov'); if(ov) ov.remove();
  document.getElementById('root').insertAdjacentHTML('beforeend',portionHTML());
}

function portionHTML(){
  const food=S.selectedFood; if(!food) return '';
  const hasGram=!!food.gPer1;
  const gInput=S.gramInput||food.gPer1||100;
  const p=S.portions;
  // Calculate based on mode
  const ex=S.gramMode&&hasGram ? gramsToExchanges(food,gInput) : null;
  const useEx=ex || {P:food.P,S:food.S,F:food.F,Fr:food.Fr,M:food.M};

  function previewLines(exData,mult=1){
    const lines=[];
    if(exData.P)  lines.push(`🥩 <b style="color:${EX_COL.P}">${fmt(exData.P*mult)}</b> Protein`);
    if(exData.S)  lines.push(`🍞 <b style="color:${EX_COL.S}">${fmt(exData.S*mult)}</b> Starch`);
    if(exData.F)  lines.push(`🥑 <b style="color:${EX_COL.F}">${fmt(exData.F*mult)}</b> Fat`);
    if(exData.Fr) lines.push(`🍎 <b style="color:${EX_COL.Fr}">${fmt(exData.Fr*mult)}</b> Fruit`);
    if(exData.M)  lines.push(`🥛 <b style="color:${EX_COL.M}">${fmt(exData.M*mult)}</b> Milk`);
    if(food.free) lines.push('✓ <b style="color:var(--grn)">Free food — no limit</b>');
    return lines.length?lines.map(l=>`<div style="font-size:14px;font-weight:600;margin-bottom:5px">${l}</div>`).join('')
      :`<div style="font-size:13px;color:var(--dim)">No points</div>`;
  }

  return `
  <div class="overlay" id="port-ov" onclick="if(event.target===this)backToPicker()">
    <div class="sheet su">
      <div class="hdl" onclick="backToPicker()"></div>
      <button onclick="backToPicker()" style="background:none;border:none;color:var(--sub);font-size:12px;margin-bottom:10px;padding:0;font-family:'Inter',sans-serif">← Back to food list</button>
      <div style="font-size:17px;font-weight:800;margin-bottom:3px">${food.name}</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:16px">1 serving = ${food.serving}</div>

      ${hasGram?`
      <!-- Toggle: gram entry vs portion -->
      <div style="display:flex;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:14px">
        <button onclick="S.gramMode=true;updatePortionUI()" style="flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;background:${S.gramMode?'#fff':'transparent'};color:${S.gramMode?'var(--teal)':'var(--sub)'};box-shadow:${S.gramMode?'0 1px 4px rgba(0,0,0,.08)':'none'}">📏 Enter grams</button>
        <button onclick="S.gramMode=false;updatePortionUI()" style="flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;background:${!S.gramMode?'#fff':'transparent'};color:${!S.gramMode?'var(--teal)':'var(--sub)'};box-shadow:${!S.gramMode?'0 1px 4px rgba(0,0,0,.08)':'none'}">🔢 Portions</button>
      </div>

      <div id="gram-section" style="${S.gramMode?'':'display:none'}">
        <div class="fg">
          <label class="lbl">Grams you are eating</label>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <input class="inp" id="gram-inp" type="number" value="${gInput}"
              oninput="S.gramInput=parseFloat(this.value)||0;updatePortionUI()"
              style="font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;text-align:center;flex:1"/>
            <span style="font-size:18px;font-weight:700;color:var(--sub)">g</span>
          </div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            ${[25,50,75,100,125,150,200,250,300].map(g=>`
              <button onclick="S.gramInput=${g};document.getElementById('gram-inp').value=${g};updatePortionUI()"
                style="padding:6px 11px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s2);color:var(--sub);font-size:11px;font-weight:600;font-family:'Inter',sans-serif">${g}g</button>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--sub);margin-top:8px;padding:8px 10px;background:var(--teal-lt);border-radius:8px;">
            1 exchange = ${food.gPer1}g, so <b style="color:var(--teal)" id="gram-ratio-text">${fmt(gInput/food.gPer1)} exchanges</b>
          </div>
        </div>
      </div>`:''}

      <div id="portion-section" style="${hasGram&&S.gramMode?'display:none':''}">
        <div class="fg">
          <label class="lbl">How many portions?</label>
          <div class="stepper" style="margin-bottom:10px">
            <button class="step-btn" onclick="S.portions=Math.max(0.5,Math.round((S.portions-.5)*2)/2);updatePortionUI()">−</button>
            <div class="step-val" id="step-val">${p}</div>
            <button class="step-btn" onclick="S.portions=Math.round((S.portions+.5)*2)/2;updatePortionUI()">+</button>
          </div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            ${[0.5,1,1.5,2,2.5,3,4,5].map(n=>`
              <button onclick="S.portions=${n};updatePortionUI()" style="padding:6px 12px;border-radius:8px;
                border:1.5px solid ${n===p?'var(--teal)':'var(--bd)'};
                background:${n===p?'var(--teal-lt)':'var(--s2)'};

      <div id="port-preview" style="background:var(--teal-lt);border:1.5px solid rgba(13,148,136,.2);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px" id="prev-title">
          Exchange points ${S.gramMode?`for ${gInput}g`:`for ${p} portion${p!==1?'s':''}`}
        </div>
        <div id="prev-lines">${S.gramMode&&hasGram?previewLines(gramsToExchanges(food,gInput)||{}):previewLines(useEx,p)}</div>
      </div>

      <!-- Meal -->
      <div class="fg">
        <label class="lbl">Add to meal</label>
        <select class="inp" onchange="S.selectedMeal=this.value" style="appearance:none">
          ${MEALS.map(m=>`<option${m===S.selectedMeal?' selected':''}>${m}</option>`).join('')}
        </select>
      </div>

      <button class="btn btn-teal" onclick="confirmFood()">Add to Diary ✓</button>
    </div>
  </div>`;
}

function updatePortionUI(){
  const food=S.selectedFood; if(!food) return;
  const p=S.portions; const g=S.gramInput||(food.gPer1||100);
  const sv=document.getElementById('step-val'); if(sv) sv.textContent=p;
  // Quick portion buttons
  document.querySelectorAll('#port-ov .step-val ~ div button, #portion-section .step-val ~ div button').forEach(btn=>{
    const n=parseFloat(btn.textContent); const sel=n===p;
    btn.style.borderColor=sel?'var(--teal)':'var(--bd)';
    btn.style.background=sel?'var(--teal-lt)':'var(--s2)';
    btn.style.color=sel?'var(--teal)':'var(--sub)';
  });
  // Gram ratio text
  if(food.gPer1){ const rt=document.getElementById('gram-ratio-text'); if(rt) rt.textContent=`${fmt(g/food.gPer1)} exchanges`; }
  // Exchange preview
  let exData;
  if(S.gramMode&&food.gPer1){ exData=gramsToExchanges(food,g)||{}; }
  else { exData={P:food.P,S:food.S,F:food.F,Fr:food.Fr,M:food.M}; }
  const mult=S.gramMode?1:p;
  const lines=[];
  if(exData.P)  lines.push(`🥩 <b style="color:${EX_COL.P}">${fmt(exData.P*mult)}</b> Protein`);
  if(exData.S)  lines.push(`🍞 <b style="color:${EX_COL.S}">${fmt(exData.S*mult)}</b> Starch`);
  if(exData.F)  lines.push(`🥑 <b style="color:${EX_COL.F}">${fmt(exData.F*mult)}</b> Fat`);
  if(exData.Fr) lines.push(`🍎 <b style="color:${EX_COL.Fr}">${fmt(exData.Fr*mult)}</b> Fruit`);
  if(exData.M)  lines.push(`🥛 <b style="color:${EX_COL.M}">${fmt(exData.M*mult)}</b> Milk`);
  if(food.free) lines.push('✓ <b style="color:var(--grn)">Free food</b>');
  const pl=document.getElementById('prev-lines'); if(pl) pl.innerHTML=lines.length?lines.map(l=>`<div style="font-size:14px;font-weight:600;margin-bottom:5px">${l}</div>`).join(''):`<div style="font-size:13px;color:var(--dim)">No points</div>`;
  const pt=document.getElementById('prev-title'); if(pt) pt.textContent=`Exchange points ${S.gramMode?`for ${g}g`:`for ${p} portion${p!==1?'s':''}`}`;
  // Toggle sections
  const gs=document.getElementById('gram-section'); if(gs) gs.style.display=S.gramMode?'':'none';
  const ps=document.getElementById('portion-section'); if(ps) ps.style.display=(!food.gPer1||!S.gramMode)?'':'none';
  // Toggle buttons style
  document.querySelectorAll('#port-ov .step-btn ~ .step-val').forEach(()=>{});
}

function backToPicker(){ const po=document.getElementById('port-ov'); if(po)po.remove(); S.modal='add-food'; render(); }

function confirmFood(){
  const food=S.selectedFood; const p=S.portions; const g=S.gramInput||(food.gPer1||null);
  let ex;
  if(S.gramMode&&food.gPer1&&g){ ex=gramsToExchanges(food,g)||{}; }
  else { ex={P:food.P,S:food.S,F:food.F,Fr:food.Fr,M:food.M}; ['P','S','F','Fr','M'].forEach(t=>{if(ex[t])ex[t]=Math.round(ex[t]*p*4)/4;}); }
  const entry={
    id:Date.now(),day:dateForOffset(0),name:food.name,
    serving:S.gramMode&&g?`${g}g`:p!==1?`${p}× (${food.serving})`:food.serving,
    meal:S.selectedMeal,free:food.free||undefined,
    ...Object.fromEntries(Object.entries(ex).filter(([k,v])=>v&&['P','S','F','Fr','M'].includes(k)))
  };
  S.entries.push(entry); save();
  const po=document.getElementById('port-ov'); if(po)po.remove();
  S.modal=null; S.selectedFood=null; S.portions=1; S.gramInput=null;
  render(); toast(`✓ ${food.name} added!`,'var(--teal)','#fff');
}

// ── Barcode result modal ──────────────────────────────────────────
function barcodeResultHTML(){
  const d=S.barcodeData; if(!d) return '';
  const g=parseInt(S.barcodeGrams)||100;
  // Convert macros per 100g to exchanges for the gram amount
  const k=g/100;

  <div class="overlay" id="bc-ov" onclick="if(event.target===this){S.modal=null;S.barcodeData=null;render()}">

      <div style="font-size:17px;font-weight:800;margin-bottom:14px;line-height:1.3">${d.name}</div>

      <div style="background:var(--s2);border:1px solid var(--bdd);border-radius:12px;padding:12px;margin-bottom:14px">
        <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Nutrition per 100g (from label)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          ${[['Carbs',d.carb,'var(--amber)'],['Protein',d.prot,'var(--violet)'],['Fat',d.fat,'#B45309']].map(([l,v,c])=>`
            <div style="text-align:center;background:var(--s1);border-radius:8px;padding:8px 4px;border:1px solid var(--bdd)">
              <div style="font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${l}</div>
              <div style="font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${c}">${v}</div>
              <div style="font-size:9px;color:var(--dim)">g</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="fg">
        <label class="lbl">How many grams are you eating?</label>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <input class="inp" id="bc-g" type="number" value="${g}" oninput="S.barcodeGrams=parseInt(this.value)||100;updateBarcodeExchanges()"
            style="font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;text-align:center;flex:1"/>
          <span style="font-size:18px;font-weight:700;color:var(--sub)">g</span>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          ${[50,100,150,200,250,300].map(gv=>`
            <button onclick="S.barcodeGrams=${gv};document.getElementById('bc-g').value=${gv};updateBarcodeExchanges()"
              style="padding:6px 11px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s2);color:var(--sub);font-size:11px;font-weight:600;font-family:'Inter',sans-serif">${gv}g</button>`).join('')}
        </div>
      </div>

      <div id="bc-ex" style="background:var(--teal-lt);border:1.5px solid rgba(13,148,136,.2);border-radius:12px;padding:14px;margin-bottom:14px">
        ${bcExHTML(S_ex,P_ex,F_ex,g)}
      </div>

      <div class="fg">
        <label class="lbl">Meal</label>
        <select class="inp" onchange="S.selectedMeal=this.value" style="appearance:none">
          ${MEALS.map(m=>`<option${m===S.selectedMeal?' selected':''}>${m}</option>`).join('')}

      </div>
      <button class="btn btn-teal" onclick="confirmBarcode()">Add to Diary ✓</button>
    </div>
  </div>`;
}
function bcExHTML(S_ex,P_ex,F_ex,g){
  const lines=[];
  if(P_ex>0) lines.push(`🥩 <b style="color:${EX_COL.P}">${fmt(P_ex)}</b> Protein exchanges`);
  if(S_ex>0) lines.push(`🍞 <b style="color:${EX_COL.S}">${fmt(S_ex)}</b> Starch exchanges`);
  if(F_ex>0) lines.push(`🥑 <b style="color:${EX_COL.F}">${fmt(F_ex)}</b> Fat exchanges`);
  return `<div style="font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Exchange points for ${g}g</div>
    ${lines.length?lines.map(l=>`<div style="font-size:14px;font-weight:600;margin-bottom:5px">${l}</div>`).join(''):`<div style="font-size:13px;color:var(--dim)">Could not calculate</div>`}`;
}
function updateBarcodeExchanges(){
  const d=S.barcodeData; if(!d) return;
  const g=parseInt(S.barcodeGrams)||100; const k=g/100;
  const S_ex=Math.round((d.carb*k/15)*4)/4;
  const P_ex=Math.round((d.prot*k/7)*4)/4;
  const F_ex=Math.round((d.fat*k/5)*4)/4;
  const el=document.getElementById('bc-ex'); if(el) el.innerHTML=bcExHTML(S_ex,P_ex,F_ex,g);
}
function confirmBarcode(){
  const d=S.barcodeData; if(!d) return;
  const g=parseInt(S.barcodeGrams)||100; const k=g/100;
  const entry={
    id:Date.now(),day:dateForOffset(0),name:d.name,serving:`${g}g`,meal:S.selectedMeal,
    S:Math.round((d.carb*k/15)*4)/4||undefined,
    P:Math.round((d.prot*k/7)*4)/4||undefined,
    F:Math.round((d.fat*k/5)*4)/4||undefined,
  };
  S.entries.push(entry); save(); S.modal=null; S.barcodeData=null;
  render(); toast('✓ Added!','var(--teal)','#fff');
}

// ── Workout modal ─────────────────────────────────────────────────
function workoutHTML(){
  const w=S.wf; const selAct=ACTS.find(a=>a.id===w.act);
  const dur=parseInt(w.mins)||0; const est=dur>0?calcBurn(w.act,dur,w.intensity):0;
  const ab=a=>{const sel=w.act===a.id;return `<button onclick="S.wf.act='${a.id}';renderEst()" style="padding:9px 8px;border-radius:10px;font-family:'Inter',sans-serif;font-size:11px;font-weight:${sel?700:500};display:flex;align-items:center;gap:5px;border:1.5px solid ${sel?'var(--amber)':'var(--bd)'};background:${sel?'var(--amber-lt)':'var(--s2)'};color:${sel?'var(--amber)':'var(--sub)'}"><span style="font-size:14px">${a.icon}</span>${a.name}</button>`;};
  return `
  <div class="overlay" id="wk-ov" onclick="if(event.target===this){S.modal=null;render()}">
    <div class="sheet su" style="max-height:94vh">
      <div class="hdl" onclick="S.modal=null;render()"></div>
      <div style="font-size:17px;font-weight:800;color:var(--amber);margin-bottom:14px">Log Workout</div>
      ${['Cardio','Calisthenics','Gym'].map(cat=>`
        <div class="fg"><div class="lbl">${cat}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${ACTS.filter(a=>a.cat===cat).map(ab).join('')}</div>
        </div>`).join('')}
      <div class="fg"><label class="lbl">Duration</label>
        <div style="position:relative"><input class="inp" type="number" value="${w.mins}" oninput="S.wf.mins=this.value;renderEst()"
          style="font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;padding-right:50px;text-align:center"/>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--sub);font-weight:600">min</span></div></div>
      <div class="fg"><div class="lbl">Intensity</div>
        <div style="display:flex;gap:8px">
          ${[['easy','😌 Easy'],['moderate','💪 Moderate'],['hard','🔥 Hard']].map(([k,l])=>{const sel=w.intensity===k;return `<button onclick="S.wf.intensity='${k}';renderEst()" style="flex:1;padding:10px 4px;border-radius:10px;font-family:'Inter',sans-serif;font-size:11px;font-weight:${sel?700:500};border:1.5px solid ${sel?'var(--amber)':'var(--bd)'};background:${sel?'var(--amber-lt)':'var(--s2)'};color:${sel?'var(--amber)':'var(--sub)'}">${l}</button>`;}).join('')}
        </div></div>
      <div class="fg"><label class="lbl">Note (optional)</label>
        <input class="inp" value="${escH(w.note)}" oninput="S.wf.note=this.value" placeholder="e.g. Morning push-up set"/></div>
      <div id="est-box">${est>0?estHTML(selAct,dur,w.intensity,est):''}</div>
      <button class="btn btn-amber" onclick="addWorkout()" style="border:none">Log Workout 🔥</button>
    </div>
  </div>`;
}
function estHTML(a,dur,intensity,est){return `<div style="background:var(--amber-lt);border:1px solid rgba(217,119,6,.2);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:9px;font-weight:700;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px">Estimated burn</div><div style="font-size:11px;color:var(--sub)">${a.icon} ${a.name} · ${dur} min · ${intensity}</div></div><div style="font-size:26px;font-weight:800;color:var(--amber);font-family:'JetBrains Mono',monospace;line-height:1">${est}<span style="font-size:11px;font-weight:400"> kcal</span></div></div>`;}
function renderEst(){const w=S.wf,dur=parseInt(w.mins)||0,est=dur>0?calcBurn(w.act,dur,w.intensity):0,a=ACTS.find(x=>x.id===w.act),box=document.getElementById('est-box');if(box)box.innerHTML=est>0?estHTML(a,dur,w.intensity,est):'';}

// ── Actions ───────────────────────────────────────────────────────
function delEntry(id){ S.entries=S.entries.filter(e=>e.id!==id); save(); render(); toast('Removed','var(--sub)','#fff'); }
function delWorkout(id){ S.workouts=S.workouts.filter(w=>w.id!==id); save(); render(); }
function addWorkout(){
  const w=S.wf,mins=parseInt(w.mins)||30,burned=calcBurn(w.act,mins,w.intensity),act=ACTS.find(a=>a.id===w.act);
  S.workouts.push({id:Date.now(),day:dateForOffset(0),act:w.act,name:act.name,icon:act.icon,mins,intensity:w.intensity,note:w.note,burned});
  save(); S.modal=null; S.wf={act:'walk',mins:'30',intensity:'moderate',note:''};
  render(); toast(`🔥 ${burned} kcal burned!`,'var(--amber)','#fff');
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

// ── Quagga scanner ────────────────────────────────────────────────
let qgActive=false;
function triggerScan(){
  if(qgActive) return; qgActive=true;
  const wrap=document.createElement('div'); wrap.id='qg-wrap';
  wrap.innerHTML=`<div id="qg-viewport"></div>
    <div class="qg-vf"><div class="qg-c tl"></div><div class="qg-c tr"></div><div class="qg-c bl"></div><div class="qg-c br"></div><div class="qg-beam"></div></div>
    <div class="qg-sh" id="sh-t" style="top:0;left:0;right:0"></div><div class="qg-sh" id="sh-b" style="left:0;right:0;bottom:0"></div>
    <div class="qg-sh" id="sh-l" style="top:0;left:0;bottom:0"></div><div class="qg-sh" id="sh-r" style="top:0;right:0;bottom:0"></div>
    <div class="qg-head">
      <div><div style="font-size:15px;font-weight:700;color:#fff">📷 Scan Barcode</div>
      <div id="qg-st" style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">Starting camera…</div></div>
      <button id="qg-x" style="background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div class="qg-foot" id="qg-ft">
      <p style="font-size:12px;color:var(--sub);text-align:center;margin-bottom:12px">Hold the barcode steady in the frame — detects automatically</p>
      <button id="qg-cancel" style="width:100%;padding:13px;border-radius:12px;background:var(--s2);border:1.5px solid var(--bd);color:var(--sub);font-size:13px;font-weight:600;font-family:'Inter',sans-serif">Cancel</button>
    </div>`;
  document.body.appendChild(wrap);
  requestAnimationFrame(()=>{
    const vf=wrap.querySelector('.qg-vf'); if(!vf) return;
    const vr=vf.getBoundingClientRect(),t=vr.top,b=window.innerHeight-vr.bottom,l=vr.left,r=window.innerWidth-vr.right,h=vr.height;
    document.getElementById('sh-t').style.height=t+'px';
    document.getElementById('sh-b').style.height=b+'px';
    document.getElementById('sh-l').style.cssText+=`;top:${t}px;height:${h}px;width:${l}px;`;
    document.getElementById('sh-r').style.cssText+=`;top:${t}px;height:${h}px;width:${r}px;`;
  });
  function closeQ(){try{Quagga.stop();}catch(e){}const el=document.getElementById('qg-wrap');if(el)el.remove();qgActive=false;}
  document.getElementById('qg-x').addEventListener('click',closeQ);
  document.getElementById('qg-cancel').addEventListener('click',()=>{closeQ();S.modal='add-food';render();});
  Quagga.init({inputStream:{type:'LiveStream',target:document.getElementById('qg-viewport'),constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},area:{top:'25%',right:'5%',bottom:'25%',left:'5%'}},decoder:{readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']},locate:true,frequency:10},function(err){
    if(err){const msg=err.name==='NotAllowedError'?'📵 Camera blocked — Settings → Safari → Camera → Allow':'⚠️ Open from Safari/Chrome, not a downloaded file';
      document.getElementById('qg-ft').innerHTML=`<p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">${msg}</p><button onclick="document.getElementById('qg-x').click();S.modal='add-food';render()" class="btn btn-teal" style="border:none">Enter manually</button>`;
      qgActive=false;return;}
    document.getElementById('qg-st').textContent='Hold barcode in frame';Quagga.start();
  });
  let detected=false;
  Quagga.onDetected(async function(res){
    if(detected)return;detected=true;Quagga.stop();
    const code=res.codeResult.code;
    document.getElementById('qg-st').textContent='✓ Detected — looking up…';
    document.getElementById('qg-ft').innerHTML=`<div style="text-align:center;padding:8px"><div style="font-size:13px;color:var(--sub);font-weight:600">🔍 Looking up product…</div><div style="font-size:10px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace">${code}</div></div>`;
    try{
      const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,nutriments,serving_size`);
      const d=await r.json();
      if(d.status!==1){
        document.getElementById('qg-ft').innerHTML=`<p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px">❌ Not in database</p><p style="font-size:10px;color:var(--dim);margin-bottom:12px;font-family:'JetBrains Mono',monospace">${code}</p>
          <div style="display:flex;gap:10px">
            <button id="qg-retry" style="flex:1;padding:12px;border-radius:10px;background:var(--s2);border:1.5px solid var(--bd);color:var(--sub);font-size:12px;font-weight:600;font-family:'Inter',sans-serif">Try Again</button>
            <button id="qg-manual" style="flex:2;padding:12px;border-radius:10px;background:var(--amber);border:none;color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif">Enter Manually</button>
          </div>`;
        document.getElementById('qg-retry').addEventListener('click',()=>{detected=false;document.getElementById('qg-st').textContent='Hold barcode in frame';document.getElementById('qg-ft').innerHTML=`<p style="font-size:12px;color:var(--sub);text-align:center;margin-bottom:12px">Hold the barcode steady in the frame</p>`;Quagga.start();});
        document.getElementById('qg-manual').addEventListener('click',()=>{closeQ();S.modal='add-food';render();});
        return;
      }
      const n=d.product.nutriments;
      const carb=+(n['carbohydrates_100g']||0).toFixed(1),prot=+(n['proteins_100g']||0).toFixed(1),fat=+(n['fat_100g']||0).toFixed(1);
      const name=d.product.product_name||'Scanned product';
      const serving=Math.round(parseFloat(d.product.serving_size)||100);
      closeQ();
      S.barcodeData={name,carb,prot,fat};S.barcodeGrams=serving;S.modal='barcode-result';
      render();toast('✓ '+name,'var(--teal)','#fff');
    }catch(e){closeQ();S.modal='add-food';render();toast('Network error — enter manually','var(--red)','#fff');}
  });
}

// ── Main render ───────────────────────────────────────────────────
function render(){
  const tab=S.tab;
  const content=tab==='home'?homeHTML():tab==='diary'?diaryHTML():moveHTML();
  const nav=['home','diary','move'].map((k,i)=>{
    const[ico,lbl]=[['🏠','Home'],['📋','Diary'],['🏋️','Move']][i];
    const active=tab===k;
    return `<button class="nb" onclick="S.tab='${k}';render()" style="color:${active?'var(--teal)':'var(--dim)'}">
      <span class="ni">${ico}</span>
      <span class="nl" style="font-weight:${active?700:500}">${lbl}</span>
    </button>`;
  }).join('');
  document.getElementById('root').innerHTML=`<div>${content}</div><nav id="nav">${nav}</nav>
    ${S.modal==='add-food'      ? foodPickerHTML()      : ''}
    ${S.modal==='barcode-result'? barcodeResultHTML()   : ''}
    ${S.modal==='workout'       ? workoutHTML()         : ''}`;
}

// ── PWA ───────────────────────────────────────────────────────────
let dp;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;});
if('serviceWorker' in navigator){const sw=`const C='ef10';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}
const mf={name:'ExchangeFit',short_name:'ExchangeFit',display:'standalone',background_color:'#F2F2F7',theme_color:'#0D9488',start_url:'.',orientation:'portrait',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230D9488'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%A5%97%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));document.head.appendChild(ml);

render();
</script>
