<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="ExchangeFit"/>
<title>ExchangeFit</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
:root{
  --bg:#0C0C0E;--s1:#161618;--s2:#1E1E21;--s3:#27272B;
  --bd:#2E2E33;--teal:#2DD4BF;--amber:#FCA000;--violet:#9B7EF8;
  --red:#F97066;--grn:#4ADE80;--blue:#60A5FA;--pink:#F472B6;
  --txt:#EBEBEF;--sub:#8B8B96;--dim:#50505A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);overscroll-behavior:none;font-family:'Space Grotesk',sans-serif;}
::-webkit-scrollbar{display:none;}
button,input,select{font-family:'Space Grotesk',sans-serif;cursor:pointer;}
#root{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:calc(68px + env(safe-area-inset-bottom,0px));}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(16,16,18,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);z-index:90;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);}
.nb{flex:1;border:none;background:none;padding:11px 4px 13px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ni{font-size:20px;line-height:1.1;}
.nl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.ph{padding:calc(48px + env(safe-area-inset-top,0px)) 18px 14px;}
.pt{font-size:24px;font-weight:700;letter-spacing:-.02em;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:10px;}
.card2{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.lbl{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:5px;}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--bd);color:var(--txt);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--teal);}
.fg{margin-bottom:13px;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;text-align:center;}
.btn-teal{background:var(--teal);color:#09090B;}
.btn-amber{background:var(--amber);color:#09090B;}
.btn-ghost{background:var(--s2);color:var(--sub);border:1.5px solid var(--bd);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(10px);}
.sheet{background:var(--s1);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;
  border-top:1px solid var(--bd);padding:0 18px calc(28px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;}
.hdl{width:38px;height:4px;background:var(--bd);border-radius:2px;margin:13px auto 15px;}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.04em;}
#toast{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(4px);opacity:0;
  padding:9px 20px;border-radius:50px;font-size:12px;font-weight:700;font-family:'Space Mono',monospace;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:500;white-space:nowrap;pointer-events:none;transition:opacity .2s,transform .2s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.su{animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);}

/* ── Exchange point cards ── */
.ex-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:10px;}
.ex-card{border-radius:14px;padding:13px 10px;text-align:center;border:1px solid var(--bd);position:relative;overflow:hidden;}
.ex-card-wide{border-radius:14px;padding:12px 14px;border:1px solid var(--bd);display:flex;align-items:center;gap:12px;}
.ex-num{font-size:28px;font-weight:700;font-family:'Space Mono',monospace;line-height:1;}
.ex-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.ex-target{font-size:10px;font-family:'Space Mono',monospace;margin-top:2px;opacity:.5;}
/* Ring progress for exchange cards */
.ex-ring{position:absolute;bottom:-18px;right:-18px;opacity:.12;}

/* ── Food picker ── */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.cat-tab{white-space:nowrap;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bd);
  background:var(--s2);color:var(--sub);font-size:12px;font-weight:600;flex-shrink:0;}
.cat-tab.active{border-color:var(--teal);background:rgba(45,212,191,.1);color:var(--teal);}
.food-item{display:flex;justify-content:space-between;align-items:center;
  padding:11px 14px;border-radius:11px;background:var(--s2);border:1px solid var(--bd);margin-bottom:7px;}
.food-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.food-serving{font-size:11px;color:var(--sub);}
.food-pts{text-align:right;flex-shrink:0;margin-left:10px;}
.add-btn{width:30px;height:30px;border-radius:8px;border:none;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── Quagga scanner ── */
#qg-wrap{position:fixed;inset:0;background:#000;z-index:1000;max-width:430px;left:50%;transform:translateX(-50%);right:auto;width:100%;}
#qg-viewport{position:absolute;inset:0;overflow:hidden;}
#qg-viewport video,#qg-viewport canvas{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;object-fit:cover!important;}
#qg-viewport canvas.drawingBuffer{display:none!important;}
.qg-head{position:absolute;top:0;left:0;right:0;z-index:20;padding:max(52px,env(safe-area-inset-top,52px)) 18px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);display:flex;justify-content:space-between;align-items:flex-start;}
.qg-foot{position:absolute;bottom:0;left:0;right:0;z-index:20;background:rgba(10,10,14,.92);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,.08);padding:20px 18px max(28px,env(safe-area-inset-bottom,28px));}
.qg-vf{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:78%;max-width:290px;height:110px;z-index:15;pointer-events:none;}
.qg-c{position:absolute;width:22px;height:22px;}
.qg-c.tl{top:0;left:0;border-top:3px solid #2DD4BF;border-left:3px solid #2DD4BF;border-radius:5px 0 0 0;}
.qg-c.tr{top:0;right:0;border-top:3px solid #2DD4BF;border-right:3px solid #2DD4BF;border-radius:0 5px 0 0;}
.qg-c.bl{bottom:0;left:0;border-bottom:3px solid #2DD4BF;border-left:3px solid #2DD4BF;border-radius:0 0 0 5px;}
.qg-c.br{bottom:0;right:0;border-bottom:3px solid #2DD4BF;border-right:3px solid #2DD4BF;border-radius:0 0 5px 0;}
@keyframes qbeam{0%{top:2px;opacity:1}100%{top:calc(100% - 4px);opacity:.25}}
.qg-beam{position:absolute;left:6px;right:6px;height:2px;background:linear-gradient(90deg,transparent,#2DD4BF,transparent);box-shadow:0 0 10px #2DD4BF;animation:qbeam 1.6s ease-in-out infinite alternate;}
.qg-sh{position:absolute;background:rgba(0,0,0,.55);z-index:14;}

/* iOS guide */
#ios-tip{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:flex-end;}
#ios-tip.on{display:flex;}
.isheet{background:var(--s1);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;border-top:1px solid var(--bd);padding:22px 18px calc(32px + env(safe-area-inset-bottom,0px));}
.istep{background:var(--s2);border-left:3px solid var(--teal);border-radius:8px;padding:11px 13px;margin-bottom:8px;font-size:13px;color:#ccc;line-height:1.5;}
#ibanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--teal);color:#09090B;padding:13px 18px;flex-direction:row;align-items:center;gap:12px;}
#ibanner.on{display:flex;}

/* Number stepper */
.stepper{display:flex;align-items:center;gap:10px;}
.step-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s2);color:var(--txt);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.step-val{font-size:22px;font-weight:700;font-family:'Space Mono',monospace;min-width:50px;text-align:center;color:var(--teal);}

/* search input */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
</style>
</head>
<body>

<div id="ios-tip">
  <div class="isheet">
    <div style="width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">Install ExchangeFit 📲</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:14px">No App Store needed</div>
    <div class="istep">1 · Open in <b style="color:#fff">Safari</b></div>
    <div class="istep">2 · Tap the <b style="color:#fff">Share ↑</b> button</div>
    <div class="istep">3 · Tap <b style="color:var(--teal)">Add to Home Screen</b></div>
    <div class="istep">4 · Tap <b style="color:var(--teal)">Add</b> — done! 🎉</div>
    <button class="btn btn-teal" style="margin-top:14px" onclick="document.getElementById('ios-tip').classList.remove('on')">Got it!</button>
  </div>
</div>

<div id="ibanner">
  <div style="flex:1"><b style="font-size:14px">Install ExchangeFit</b><br><span style="font-size:11px;opacity:.7">Works offline · saves to your phone</span></div>
  <button id="ibtn" style="background:#09090B;color:var(--teal);border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;font-family:'Space Grotesk',sans-serif">Install</button>
  <button id="ix" style="background:none;border:none;color:rgba(0,0,0,.5);font-size:22px;line-height:1">×</button>
</div>

<div id="root"></div>
<div id="toast"></div>

// Barcode macro calculator — converts per-100g values to exchanges
function macroToExchanges(carb100, prot100, fat100, grams) {
  const k = grams / 100;
  const c = carb100*k, p = prot100*k, f = fat100*k;
  // Determine dominant type
  const sEx = c / 15, pEx = p / 7, fEx = f / 5;
  // Return all three (barcode foods show all contributions)
  return {
    S: Math.round(sEx * 4) / 4,
    P: Math.round(pEx * 4) / 4,
    F: Math.round(fEx * 4) / 4,
  };
}

// ─── Computed ─────────────────────────────────────────────────────
function todayKey(){ return new Date().toDateString(); }
function getTodayEntries(){ return S.entries.filter(e=>e.day===todayKey()); }
function getTodayWorkouts(){ return S.workouts.filter(w=>w.day===todayKey()); }
function getTotals(){
  const foods = getTodayEntries();
  const wkts  = getTodayWorkouts();
  const pts = foods.reduce((a,e)=>({
    P:a.P+(e.P||0), S:a.S+(e.S||0), F:a.F+(e.F||0), Fr:a.Fr+(e.Fr||0), M:a.M+(e.M||0)
  }), {P:0,S:0,F:0,Fr:0,M:0});
  const burned = wkts.reduce((s,w)=>s+w.burned,0);
  // Estimate kcal from exchanges: P×55 + S×80 + F×45 + Fr×60 + M×90
  const kcal = pts.P*55 + pts.S*80 + pts.F*45 + pts.Fr*60 + pts.M*90;
  return { pts, burned, kcal, wkts, foods };
}
function calcBurn(actId,mins,intensity){
  const a=ACTS.find(x=>x.id===actId); if(!a) return 0;
  const m=intensity==='easy'?.75:intensity==='hard'?1.3:1.0;
  return Math.round(a.met*m*WT_KG*(mins/60));
}

function exPill(type, val){
  const c=EX_CFG[type]; if(!c) return '';
  return `<span class="pill" style="background:${c.bg};color:${c.color}">${c.emoji} ${val} ${c.label}</span>`;

function exLine(food){
  const parts=[];
  if(food.P)  parts.push(exPill('P',  fmt(food.P)));
  if(food.S)  parts.push(exPill('S',  fmt(food.S)));
  if(food.F)  parts.push(exPill('F',  fmt(food.F)));
  if(food.Fr) parts.push(exPill('Fr', fmt(food.Fr)));

  if(food.free) parts.push(`<span class="pill" style="background:rgba(74,222,128,.1);color:var(--grn)">✓ Free</span>`);
  return parts.join(' ');
}
function fmt(n){ if(!n) return 0; return n%1===0?n:+n.toFixed(2); }

// ─── Arc SVG for points cards ──────────────────────────────────────
function arcCard(type, consumed, target){
  const c=EX_CFG[type];
  const pct=Math.min(1,consumed/target);
  const r=22, circ=2*Math.PI*r, dash=pct*circ;
  const over=consumed>target;
  const col=over?'var(--red)':c.color;
  return `
  <div class="ex-card" style="background:${c.bg}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="text-align:left">
        <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${c.color};margin-bottom:2px">${c.emoji} ${c.label}</div>
        <div style="font-size:26px;font-weight:700;font-family:'Space Mono',monospace;line-height:1;color:${over?'var(--red)':c.color}">${fmt(consumed)}</div>
        <div style="font-size:10px;color:${c.color};opacity:.5;margin-top:2px">of ${target}</div>
      </div>
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
        <circle cx="26" cy="26" r="${r}" fill="none" stroke="${col}" stroke-width="4"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 26 26)"/>
        <text x="26" y="30" text-anchor="middle" fill="${col}" font-size="10" font-weight="700" font-family="'Space Mono',monospace">${Math.round(pct*100)}%</text>
      </svg>
    </div>
  </div>`;
}

// ─── Modal: Portion selector ──────────────────────────────────────
function openPortion(food){
  S.selectedFood = food;
  S.portions = 1;
  // Remove food picker overlay and show portion modal
  const overlay=document.getElementById('fp-overlay');
  if(overlay) overlay.remove();
  // Render portion sheet

    food.F  ? `🥑 ${fmt(food.F*p)} Fat`       : '',
    food.Fr ? `🍎 ${fmt(food.Fr*p)} Fruit`    : '',

  S.modal='add-food'; render();
}

function confirmAddFood(){
  const food=S.selectedFood; const p=S.portions;
  const entry={
    id:Date.now(), day:todayKey(), name:food.name,
    serving:`${p===1?food.serving:`${p}× ${food.serving}`}`,
    meal:S.selectedMeal,
    P:  food.P  ? food.P*p  : undefined,
    S:  food.S  ? food.S*p  : undefined,
    F:  food.F  ? food.F*p  : undefined,
    Fr: food.Fr ? food.Fr*p : undefined,
    M:  food.M  ? food.M*p  : undefined,

  return `
    <div style="font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">Exchange points for ${g}g</div>
    ${parts.length?parts.map(p=>`<div style="font-size:14px;font-weight:600;margin-bottom:6px">${p}</div>`).join('')
      :`<div style="font-size:13px;color:var(--dim)">Could not calculate — check macros</div>`}`;
}

function updateBarcodeExchanges(){
  const d=S.barcodeData; if(!d) return;

function renderEstimate(){

// ─── Actions ─────────────────────────────────────────────────────
function deleteEntry(id){ S.entries=S.entries.filter(e=>e.id!==id); save(); render(); toast('Removed','var(--sub)','#fff'); }
function deleteWorkout(id){ S.workouts=S.workouts.filter(w=>w.id!==id); save(); render(); }

// ─── Quagga Scanner (preserved from last working version) ─────────
let qgActive=false;
function triggerScan(){
  if(qgActive) return; qgActive=true;
  const wrap=document.createElement('div'); wrap.id='qg-wrap';
  wrap.innerHTML=`
    <div id="qg-viewport"></div>
    <div class="qg-vf"><div class="qg-c tl"></div><div class="qg-c tr"></div><div class="qg-c bl"></div><div class="qg-c br"></div><div class="qg-beam"></div></div>
    <div class="qg-sh" id="sh-t" style="top:0;left:0;right:0"></div>
    <div class="qg-sh" id="sh-b" style="left:0;right:0;bottom:0"></div>
    <div class="qg-sh" id="sh-l" style="top:0;left:0;bottom:0"></div>
    <div class="qg-sh" id="sh-r" style="top:0;right:0;bottom:0"></div>
    <div class="qg-head">
      <div><div style="font-size:15px;font-weight:700;color:#fff">📷 Scan Barcode</div>
      <div id="qg-status" style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px">Starting camera…</div></div>
      <button id="qg-close" style="background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div class="qg-foot" id="qg-foot">
      <p style="font-size:12px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:12px">Hold the barcode steady in the frame — detects automatically</p>
      <button id="qg-cancel" style="width:100%;padding:13px;border-radius:12px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif">Cancel — enter manually instead</button>
    </div>`;
  document.body.appendChild(wrap);
  requestAnimationFrame(()=>{
    const vf=wrap.querySelector('.qg-vf'); if(!vf) return;
    const vr=vf.getBoundingClientRect();
    const t=vr.top,b=window.innerHeight-vr.bottom,l=vr.left,r=window.innerWidth-vr.right,h=vr.height;
    document.getElementById('sh-t').style.height=t+'px';
    document.getElementById('sh-b').style.height=b+'px';
    document.getElementById('sh-l').style.cssText+=`;top:${t}px;height:${h}px;width:${l}px;`;
    document.getElementById('sh-r').style.cssText+=`;top:${t}px;height:${h}px;width:${r}px;`;
  });
  function closeScanner(){ try{Quagga.stop();}catch(e){} const el=document.getElementById('qg-wrap'); if(el)el.remove(); qgActive=false; }
  document.getElementById('qg-close').addEventListener('click',closeScanner);
  document.getElementById('qg-cancel').addEventListener('click',()=>{ closeScanner(); S.modal='add-food'; render(); });
  Quagga.init({
    inputStream:{ type:'LiveStream', target:document.getElementById('qg-viewport'),
      constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},
      area:{top:'25%',right:'5%',bottom:'25%',left:'5%'}},
    decoder:{readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']},
    locate:true, frequency:10
  }, function(err){
    if(err){
      const msg=err.name==='NotAllowedError'?'📵 Camera blocked — Settings → Safari → Camera → Allow':'⚠️ Camera unavailable — open from Safari, not a file';
      document.getElementById('qg-foot').innerHTML=`<p style="font-size:13px;font-weight:700;color:#F97066;margin-bottom:6px">${msg}</p>
        <button onclick="closeScanner()" style="width:100%;padding:13px;border-radius:12px;background:#FCA000;border:none;color:#09090B;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif">Enter food manually</button>`;
      qgActive=false; return;
    }
    document.getElementById('qg-status').textContent='Hold barcode in the frame';
    Quagga.start();
  });
  let detected=false;
  Quagga.onDetected(async function(result){
    if(detected) return; detected=true; Quagga.stop();
    const code=result.codeResult.code;
    document.getElementById('qg-status').textContent='✓ Barcode detected — looking up…';
    document.getElementById('qg-foot').innerHTML=`<div style="text-align:center;padding:8px 0"><div style="font-size:13px;color:rgba(255,255,255,.7);font-weight:600">🔍 Looking up product…</div><div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;font-family:'Space Mono',monospace">${code}</div></div>`;
    try{
      const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,nutriments,serving_size`);
      const d=await r.json();
      if(d.status!==1){
        document.getElementById('qg-foot').innerHTML=`
          <p style="font-size:13px;font-weight:700;color:#F97066;margin-bottom:4px">❌ Product not in database</p>
          <p style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:12px;font-family:'Space Mono',monospace">${code}</p>
          <div style="display:flex;gap:10px">
            <button id="qg-retry" style="flex:1;padding:12px;border-radius:10px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:12px;font-weight:600;font-family:'Space Grotesk',sans-serif">Try Again</button>
            <button id="qg-manual" style="flex:2;padding:12px;border-radius:10px;background:#FCA000;border:none;color:#09090B;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif">Enter Manually</button>
          </div>`;
        document.getElementById('qg-retry').addEventListener('click',()=>{ detected=false; document.getElementById('qg-status').textContent='Hold barcode in frame'; document.getElementById('qg-foot').innerHTML=`<p style="font-size:12px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:12px">Hold the barcode steady in the frame</p>`; Quagga.start(); });
        document.getElementById('qg-manual').addEventListener('click',()=>{ closeScanner(); S.modal='add-food'; render(); });
        return;
      }
      const n=d.product.nutriments;
      const carb=+(n['carbohydrates_100g']||0).toFixed(1);
      const prot=+(n['proteins_100g']||0).toFixed(1);
      const fat=+(n['fat_100g']||0).toFixed(1);
      const name=d.product.product_name||'Scanned product';
      const serving=Math.round(parseFloat(d.product.serving_size)||100);
      closeScanner();
      S.barcodeData={name,carb,prot,fat}; S.barcodeGrams=serving;
      S.modal='barcode-result'; render();
      toast('✓ '+name,'var(--grn)','#09090B');
    }catch(e){ closeScanner(); S.modal='add-food'; render(); toast('Network error — enter manually','var(--red)','#fff'); }
  });
}

// ─── Main render ──────────────────────────────────────────────────
function render(){
  const tabContent = S.tab==='home' ? homeHTML() : S.tab==='diary' ? diaryHTML() : moveHTML();
  const nav=['home','diary','move'].map((k,i)=>{
    const[ico,lbl]=[['🏠','Home'],['📋','Diary'],['🏋️','Move']][i];
    const active=S.tab===k;
    return `<button class="nb" onclick="S.tab='${k}';render()" style="color:${active?'var(--teal)':'var(--dim)'}">
      <span class="ni">${ico}</span>
      <span class="nl" style="font-weight:${active?700:500}">${lbl}</span>
    </button>`;
  }).join('');
  document.getElementById('root').innerHTML=`
    <div>${tabContent}</div>
    <nav id="nav">${nav}</nav>
    ${S.modal==='add-food'     ? foodPickerHTML()      : ''}
    ${S.modal==='barcode-result'? barcodeResultHTML()  : ''}
    ${S.modal==='workout'      ? workoutModalHTML()    : ''}
  `;
}

// ─── PWA ──────────────────────────────────────────────────────────
let dp;
document.getElementById('ibtn').addEventListener('click',async()=>{ if(!dp)return; dp.prompt(); const{outcome}=await dp.userChoice; if(outcome==='accepted')document.getElementById('ibanner').classList.remove('on'); dp=null; });
document.getElementById('ix').addEventListener('click',()=>document.getElementById('ibanner').classList.remove('on'));
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); dp=e; document.getElementById('ibanner').classList.add('on'); });
if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!navigator.standalone){ setTimeout(()=>document.getElementById('ios-tip').classList.add('on'),1600); }
if('serviceWorker' in navigator){ const sw=`const C='ef8';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`; navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{}); }
const mf={name:'ExchangeFit',short_name:'ExchangeFit',display:'standalone',background_color:'#0C0C0E',theme_color:'#0C0C0E',start_url:'.',orientation:'portrait',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230C0C0E'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%A5%97%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml'}]};
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));document.head.appendChild(ml);

render();
</script>
